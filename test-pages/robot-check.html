<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Check Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #22181c, #7f1d1d);
        color: white;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        max-width: 560px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(0, 0, 0, 0.22);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Security Check</h1>
      <p>Are you a robot? Please complete the CAPTCHA before proceeding.</p>
      <p>This page exists only to verify that the extension halts and updates its badge correctly.</p>
    </main>
  </body>
</html>
